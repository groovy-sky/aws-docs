<header class="site-header">
  <div class="site-brand">
    <a href="/aws-docs/">{{ .Site.Title }}</a>
  </div>
  <nav class="site-nav">
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="{{ if $.IsMenuCurrent "main" . }}active{{ end }}">
        {{ .Name }}
      </a>
    {{ end }}
  </nav>
</header>
