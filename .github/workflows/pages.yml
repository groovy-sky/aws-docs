name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ['Crawl AWS Docs']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Normalize markdown leading dashes for Hugo
        run: |
          set -euo pipefail

          fixed=0
          while IFS= read -r -d '' file; do
            first_line=""
            IFS= read -r first_line < "$file" || true

            if [ "$first_line" = "---" ]; then
              # Keep valid YAML front matter intact (opening and closing delimiters).
              if awk 'NR > 1 && $0 == "---" { found=1; exit } END { exit(found ? 0 : 1) }' "$file"; then
                continue
              fi
            fi

            if [ "${first_line#- }" != "$first_line" ] || [ "$first_line" = "---" ]; then
              tmp_file="$(mktemp)"
              {
                printf '<!-- hugo-normalized-leading-dash -->\n'
                cat "$file"
              } > "$tmp_file"
              mv "$tmp_file" "$file"
              fixed=$((fixed + 1))
            fi
          done < <(find docs -type f -name '*.md' -print0)

          echo "Normalized $fixed markdown files"

      - name: Build with Hugo
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
