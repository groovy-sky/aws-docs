name: Build aws-docs Binary

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -v -o dist/aws-docs ./cmd/aws-docs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-docs-linux-amd64
          path: dist/aws-docs
          if-no-files-found: error
