name: Build aws-docs Binary

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
  pull_request:
    branches: [main]
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -v -o dist/aws-docs ./cmd/aws-docs

      - name: Commit binary back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/aws-docs
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
            exit 0
          fi
          git commit -m "chore(ci): update aws-docs binary"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-docs-linux-amd64
          path: dist/aws-docs
          if-no-files-found: error
